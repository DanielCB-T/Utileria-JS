<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/utileria.js"></script>
    <script src="js/login.js" defer></script>
</head>

<body>

    <div class="contenedor pequeno">
        <h1>Iniciar Sesión</h1>
        <p class="subtitulo">Ingresa tus credenciales para acceder a tu cuenta.</p>

        <form id="formularioLogin" novalidate>
            <!-- Correo -->
            <div class="grupo-campo" id="grupoCorreo">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com">
                <span class="mensaje-error">Introduce un formato de correo válido.</span>
            </div>

            <!-- Contraseña -->
            <div class="grupo-campo" id="grupoContrasena">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña">
                <span class="mensaje-error">Mínimo 8 caracteres, una mayúscula, minúscula, número y carácter especial.</span>
            </div>

            <button type="submit" class="boton-primario">Ingresar</button>
        </form>

        <p class="texto-pie">¿No tienes cuenta? <a href="index.html">Regístrate aquí</a></p>
    </div>

</body>

</html>
